<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>Expense & Budget Visualizer</h1>
    <section id="balance-section" aria-label="Total Balance">
      <h2>Total Balance</h2>
      <p id="balance-display">$0.00</p>
    </section>
  </header>

  <main>
    <section id="form-section" aria-label="Add Expense">
      <h2>Add Expense</h2>
      <form id="expense-form" novalidate>
        <label for="item-name">Item Name</label>
        <input type="text" id="item-name" name="name" placeholder="e.g. Lunch" />
        <span class="error" id="error-name"></span>

        <label for="item-amount">Amount</label>
        <input type="number" id="item-amount" name="amount" placeholder="e.g. 12.50" min="0.01" step="0.01" />
        <span class="error" id="error-amount"></span>

        <label for="item-category">Category</label>
        <select id="item-category" name="category">
          <option value="">-- Select --</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
        <span class="error" id="error-category"></span>

        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <section id="chart-section" aria-label="Spending Chart">
      <h2>Spending by Category</h2>
      <canvas id="pie-chart" width="300" height="300"></canvas>
    </section>

    <section id="transactions-section" aria-label="Transaction List">
      <h2>Transactions</h2>
      <ul id="transaction-list"></ul>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
